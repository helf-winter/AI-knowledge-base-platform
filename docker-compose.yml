services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-kb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_base}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-knowledge_base}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-kb-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-kb-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-knowledge_base}
      REDIS_URL: redis://redis:6379/0
      EMBEDDING_PROVIDER: bge
      EMBEDDING_MODEL_PATH: /models/bge-m3
      EMBEDDING_DIMENSION: 1024
      BACKGROUND_PARSE_THRESHOLD_MB: ${BACKGROUND_PARSE_THRESHOLD_MB:-20}
      PARSE_TASK_STALE_MINUTES: ${PARSE_TASK_STALE_MINUTES:-60}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/data/uploads
      - ${EMBEDDING_MODEL_HOST_PATH:-D:/code/models/bge-m3}:/models/bge-m3:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-kb-worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --pool=solo --loglevel=info
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-knowledge_base}
      REDIS_URL: redis://redis:6379/0
      EMBEDDING_PROVIDER: bge
      EMBEDDING_MODEL_PATH: /models/bge-m3
      EMBEDDING_DIMENSION: 1024
      BACKGROUND_PARSE_THRESHOLD_MB: ${BACKGROUND_PARSE_THRESHOLD_MB:-20}
      PARSE_TASK_STALE_MINUTES: ${PARSE_TASK_STALE_MINUTES:-60}
    volumes:
      - uploads_data:/app/data/uploads
      - ${EMBEDDING_MODEL_HOST_PATH:-D:/code/models/bge-m3}:/models/bge-m3:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    container_name: ai-kb-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
